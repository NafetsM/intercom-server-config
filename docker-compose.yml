version: '3.8'

volumes:
  mongodb-data:
  nginx-certs:

services:
  mongodb:
    image: mongo:4.4
    volumes:
      - mongodb-data:/data/db
    restart: unless-stopped

  intercom-manager:
    build:
      context: ./intercom-manager
      dockerfile: Dockerfile
    environment:
      PORT: 8000
      SMB_ADDRESS: http://${SERVER_IP}:4443
      DB_CONNECTION_STRING: mongodb://mongodb:27017/intercom-manager
      PUBLIC_HOST: https://${SERVER_IP}
    depends_on:
      - mongodb
    restart: unless-stopped

  intercom-frontend:
    image: eyevinntechnology/intercom-frontend
    environment:
      PORT: 80
      VITE_BACKEND_URL: https://${SERVER_IP}/
    depends_on:
      - intercom-manager
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-certs:/etc/nginx/certs
    depends_on:
      - intercom-frontend
      - intercom-manager
    restart: unless-stopped
    command: >-
      sh -c "apk add --no-cache openssl &&
      mkdir -p /etc/nginx/certs &&
      openssl req -x509 -nodes -days 365 -newkey rsa:2048
      -keyout /etc/nginx/certs/key.pem
      -out /etc/nginx/certs/cert.pem
      -subj /CN=${SERVER_IP}/O=Intercom/C=DE &&
      nginx -g 'daemon off;'"